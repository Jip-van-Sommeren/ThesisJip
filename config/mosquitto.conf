# Mosquitto MQTT Broker Configuration for Battery Twin

# Basic settings
listener 1883 0.0.0.0
allow_anonymous true
protocol mqtt

# WebSocket support
listener 9001
allow_anonymous true
protocol websockets

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true

# Connection settings
max_connections -1
max_queued_messages 1000

# Message size
message_size_limit 0

# Keep alive
max_keepalive 65535
