# Default Storage Configuration for Multi-Agent System

# Backend Selection
time_series_backend: "influxdb"
document_backend: "mongodb"
graph_backend: "neo4j"
cache_backend: "redis"

# InfluxDB Configuration
influx_config:
  host: "localhost"
  port: 8086
  database: "agent_metrics"
  username: "admin"
  password: "password123"
  ssl: false
  verify_ssl: false
  timeout: 30
  retention_policy: "autogen"

# MongoDB Configuration
mongo_config:
  host: "localhost"
  port: 27017
  database: "agent_system"
  username: "admin"
  password: "password123"
  auth_source: "admin"
  replica_set: null
  ssl: false
  connection_timeout: 30000
  server_selection_timeout: 30000

# Neo4j Configuration
neo4j_config:
  uri: "bolt://localhost:7687"
  username: "neo4j"
  password: "password123"
  database: "agent_hierarchy"
  encrypted: false
  trust: "TRUST_SYSTEM_CA_SIGNED_CERTIFICATES"
  max_connection_lifetime: 3600
  max_connection_pool_size: 50
  connection_acquisition_timeout: 60

# Redis Configuration
redis_config:
  host: "localhost"
  port: 6379
  db: 0
  password: null
  ssl: false
  ssl_cert_reqs: "required"
  connection_pool_max_connections: 50
  socket_timeout: 30
  socket_connect_timeout: 30
  decode_responses: true

# Data Retention Policies (days)
retention:
  belief_retention_days: 30
  goal_retention_days: 90
  message_retention_days: 90
  hierarchy_retention_days: 365
  performance_retention_days: 7
  agent_profile_retention_days: 1095

# Performance Settings
batch_size: 1000
flush_interval: 5 # seconds
max_retries: 3
retry_delay: 1 # seconds

# Feature Flags
enable_time_series: true
enable_document_store: true
enable_graph_store: true
enable_cache: true
auto_persist_beliefs: true
auto_persist_goals: true
auto_persist_messages: true
