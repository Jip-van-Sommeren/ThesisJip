# Default Battery Digital Twin Configuration
#
# This configuration enables the core monitoring pipeline:
# Telemetry → State Estimation → Health Monitoring

# Battery identification
battery_id: "B0005"

# MQTT Broker Configuration
mqtt_broker: "localhost"
mqtt_port: 1883
mqtt_keepalive: 60

# Storage Configuration
enable_storage: false
storage_config_path: null

# Agent Enable Flags
enable_telemetry_ingestor: true
enable_state_estimator: true
enable_health_monitor: true
enable_physics_model: false
enable_ml_residual: false

# Extended Kalman Filter Configuration
ekf_initial_soc: 0.8
ekf_initial_soh: 1.0
ekf_capacity_nominal: 2.0

# Health Monitoring Configuration
health_initial_soh: 1.0
health_initial_r0: 0.01
health_eol_threshold: 0.8

# Logging Configuration
log_level: "INFO"
log_file: null

# Performance Monitoring
enable_metrics: true
metrics_interval: 10.0
